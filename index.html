<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏕️ Поездка на Таватуй</title>
    <style>
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #22263a;
        --border: #2e3350;
        --accent: #4f8ef7;
        --accent2: #7c5cfc;
        --green: #3ecf8e;
        --red: #f76f6f;
        --yellow: #f7c948;
        --text: #e8eaf2;
        --muted: #7c809a;
        --radius: 14px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
      }

      /* === OVERLAY === */
      #nameOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      .nameCard {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        max-width: 340px;
        width: 90%;
      }
      .nameCard .lake-emoji {
        font-size: 56px;
        margin-bottom: 16px;
      }
      .nameCard h2 {
        font-size: 22px;
        margin-bottom: 6px;
      }
      .nameCard p {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 24px;
      }
      .nameCard input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 16px;
        margin-bottom: 14px;
        outline: none;
      }
      .nameCard input:focus {
        border-color: var(--accent);
      }
      .nameCard button {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .nameCard button:hover {
        opacity: 0.88;
      }

      /* === HEADER === */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      header h1 {
        font-size: 18px;
        font-weight: 700;
      }
      header .who {
        font-size: 13px;
        color: var(--muted);
      }
      .online-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        margin-right: 5px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* === LAYOUT === */
      .container {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px 16px;
      }

      /* === TABS === */
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .tab {
        padding: 8px 16px;
        border-radius: 30px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .tab.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(79, 142, 247, 0.1);
      }
      .tab:hover:not(.active) {
        border-color: var(--muted);
        color: var(--text);
      }

      /* === ADD FORM === */
      .addForm {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px;
        margin-bottom: 24px;
      }
      .addForm .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .addForm input,
      .addForm select {
        flex: 1;
        min-width: 140px;
        padding: 10px 14px;
        border-radius: 9px;
        border: 1.5px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
        outline: none;
      }
      .addForm input:focus,
      .addForm select:focus {
        border-color: var(--accent);
      }
      .addForm select {
        min-width: 120px;
        max-width: 160px;
        cursor: pointer;
      }
      .addForm .submitRow {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      .addForm textarea {
        width: 100%;
        padding: 10px 14px;
        border-radius: 9px;
        border: 1.5px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
        outline: none;
        resize: none;
        min-height: 60px;
        margin-top: 10px;
      }
      .addForm textarea:focus {
        border-color: var(--accent);
      }
      .btnPrimary {
        padding: 10px 22px;
        border-radius: 9px;
        border: none;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
        white-space: nowrap;
      }
      .btnPrimary:hover {
        opacity: 0.85;
      }

      /* === ALTERNATIVES === */
      .alts-section { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
      .alt-item {
        display: flex; align-items: center; gap: 10px;
        padding: 7px 10px; border-radius: 9px; margin-bottom: 5px;
        background: var(--bg); border: 1px solid var(--border);
        transition: border-color .2s;
      }
      .alt-item.winner { border-color: var(--green); background: rgba(62,207,142,.06); }
      .alt-item .alt-name { flex: 1; font-size: 14px; }
      .alt-item .alt-price { font-size: 12px; color: var(--green); }
      .alt-item .alt-author { font-size: 11px; color: var(--muted); }
      .alt-vote { display: flex; align-items: center; gap: 5px; }
      .altVoteBtn {
        width: 28px; height: 24px; border-radius: 6px; border: 1.5px solid var(--border);
        background: transparent; color: var(--muted); font-size: 13px; cursor: pointer;
        transition: all .15s; display: flex; align-items: center; justify-content: center;
      }
      .altVoteBtn:hover { border-color: var(--accent); color: var(--accent); }
      .altVoteBtn.up.active { background: rgba(62,207,142,.15); border-color: var(--green); color: var(--green); }
      .altVoteBtn.down.active { background: rgba(247,111,111,.12); border-color: var(--red); color: var(--red); }
      .alt-score { font-size: 13px; font-weight: 700; min-width: 18px; text-align: center; }
      .winner-badge { font-size: 11px; background: rgba(62,207,142,.2); color: var(--green); padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
      .add-alt-row { display: flex; gap: 7px; margin-top: 8px; flex-wrap: wrap; }
      .add-alt-row input {
        flex: 1; min-width: 120px; padding: 7px 11px; border-radius: 8px;
        border: 1.5px solid var(--border); background: var(--surface2);
        color: var(--text); font-size: 13px; outline: none;
      }
      .add-alt-row input:focus { border-color: var(--accent); }
      .add-alt-row button {
        padding: 7px 14px; border-radius: 8px; border: none;
        background: var(--surface2); color: var(--accent); font-size: 13px;
        cursor: pointer; white-space: nowrap; border: 1px solid var(--accent);
        transition: background .15s;
      }
      .add-alt-row button:hover { background: rgba(79,142,247,.15); }
      .alts-toggle {
        font-size: 12px; color: var(--muted); cursor: pointer; margin-top: 6px;
        display: inline-flex; align-items: center; gap: 4px; user-select: none;
      }
      .alts-toggle:hover { color: var(--text); }

      /* === ITEMS === */
      .section-title {
        font-size: 13px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;
      }

      .item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        margin-bottom: 10px;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        transition: border-color 0.2s;
      }
      .item:hover {
        border-color: var(--border);
      }
      .item.voted-up {
        border-color: rgba(62, 207, 142, 0.35);
      }
      .item.voted-down {
        border-color: rgba(247, 111, 111, 0.2);
      }

      .vote-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        min-width: 40px;
      }
      .voteBtn {
        width: 36px;
        height: 30px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 16px;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .voteBtn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .voteBtn.up.active {
        background: rgba(62, 207, 142, 0.15);
        border-color: var(--green);
        color: var(--green);
      }
      .voteBtn.down.active {
        background: rgba(247, 111, 111, 0.12);
        border-color: var(--red);
        color: var(--red);
      }
      .vote-score {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        min-width: 20px;
        text-align: center;
      }
      .vote-score.pos {
        color: var(--green);
      }
      .vote-score.neg {
        color: var(--red);
      }

      .item-body {
        flex: 1;
      }
      .item-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .item-meta {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .item-qty {
        background: rgba(79, 142, 247, 0.15);
        color: var(--accent);
        padding: 2px 8px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: 600;
      }
      .item-cat {
        background: var(--surface2);
        padding: 2px 8px;
        border-radius: 5px;
        font-size: 12px;
      }
      .item-note {
        font-size: 13px;
        color: var(--muted);
        margin-top: 6px;
      }

      .delete-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        padding: 2px 4px;
        border-radius: 5px;
        transition: color 0.15s;
        opacity: 0;
      }
      .item:hover .delete-btn {
        opacity: 1;
      }
      .delete-btn:hover {
        color: var(--red);
      }

      /* === EMPTY === */
      .empty {
        text-align: center;
        color: var(--muted);
        padding: 40px 20px;
        font-size: 14px;
      }
      .empty .emoji {
        font-size: 36px;
        display: block;
        margin-bottom: 10px;
      }

      /* === TOAST === */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 22px;
        font-size: 14px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
      }

      /* === STATUS BAR === */
      .status-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
        padding: 10px 20px;
        border-top: 1px solid var(--border);
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
      }
      .status-dot.connected {
        background: var(--green);
      }
      .pb {
        padding-bottom: 50px;
      }

      /* === RESPONSIVE === */
      @media (max-width: 480px) {
        .addForm select {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- Name Overlay -->
    <div id="nameOverlay">
      <div class="nameCard">
        <div class="lake-emoji">🏕️</div>
        <h2>Поездка на озеро</h2>
        <p>Как тебя зовут? Все увидят твоё имя рядом с предложениями.</p>
        <input
          type="text"
          id="nameInput"
          placeholder="Твоё имя..."
          maxlength="30"
          autofocus
        />
        <button onclick="setName()">Войти →</button>
      </div>
    </div>

    <!-- Header -->
    <header>
      <h1>🏕️ Поездка на озеро</h1>
      <span class="who"
        ><span class="online-dot"></span><span id="headerName">...</span></span
      >
    </header>

    <!-- Main -->
    <div class="container pb">
      <!-- Budget bar -->
      <div id="budgetBar" style="display:none; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
        <span style="color:var(--muted); font-size:13px;">💰 Общая сумма</span>
        <span id="totalSum" style="font-size:22px; font-weight:700; color:var(--green);">0 ₽</span>
      </div>

      <!-- Tabs -->
      <div class="tabs" id="tabs">
        <button class="tab active" onclick="setTab('all')" data-tab="all">
          Все
        </button>
        <button class="tab" onclick="setTab('food')" data-tab="food">
          🍖 Еда
        </button>
        <button class="tab" onclick="setTab('drinks')" data-tab="drinks">
          🥤 Напитки
        </button>
        <button class="tab" onclick="setTab('gear')" data-tab="gear">
          ⛺ Снаряжение
        </button>
        <button class="tab" onclick="setTab('other')" data-tab="other">
          📝 Прочее
        </button>
      </div>

      <!-- Add form -->
      <div class="addForm">
        <div class="row">
          <input
            type="text"
            id="itemName"
            placeholder="Что взять? (напр., Колбаса)"
            maxlength="80"
          />
          <input
            type="text"
            id="itemQty"
            placeholder="Кол-во (напр., 2 кг)"
            maxlength="30"
            style="max-width: 130px"
          />
          <input
            type="number"
            id="itemPrice"
            placeholder="Цена ₽"
            min="0"
            step="any"
            style="max-width: 110px"
          />
          <select id="itemCat">
            <option value="food">🍖 Еда</option>
            <option value="drinks">🥤 Напитки</option>
            <option value="gear">⛺ Вещи</option>
            <option value="other">📝 Прочее</option>
          </select>
        </div>
        <textarea
          id="itemNote"
          placeholder="Комментарий (необязательно)..."
          rows="2"
        ></textarea>
        <div class="submitRow">
          <button class="btnPrimary" onclick="addItem()">
            ＋ Добавить предложение
          </button>
        </div>
      </div>

      <!-- List -->
      <div id="list"></div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Подключение...</span>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Firebase -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        update,
        remove,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

      // ─── ВСТАВЬТЕ ВАШУ FIREBASE КОНФИГУРАЦИЮ ЗДЕСЬ ───────────────────────────
      const firebaseConfig = {
        apiKey: "AIzaSyBYue3QHHTrdkGToB317EN2CvW7aRTcWM4",
        authDomain: "poezdka-na-ozero-7ab6f.firebaseapp.com",
        databaseURL:
          "https://poezdka-na-ozero-7ab6f-default-rtdb.firebaseio.com",
        projectId: "poezdka-na-ozero-7ab6f",
        storageBucket: "poezdka-na-ozero-7ab6f.firebasestorage.app",
        messagingSenderId: "573856902873",
        appId: "1:573856902873:web:89d0eb1f0d44ac68ed98c8",
        measurementId: "G-VCM7WTZBX6",
      };
      // ──────────────────────────────────────────────────────────────────────────

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const itemsRef = ref(db, "items");

      let currentTab = "all";
      let allItems = {};
      const getName = () => localStorage.getItem("lake_name") || "";
      const nameKey = (n) => encodeURIComponent(n).replace(/%/g, '_');
      Object.defineProperty(window, "myName", {
        get: () => getName(),
        set: () => {},
      });

      // make these global
      window._db = { itemsRef, update, remove, ref, db };

      // Connection status
      const connRef = ref(db, ".info/connected");
      onValue(connRef, (snap) => {
        const connected = snap.val();
        document.getElementById("statusDot").className =
          "status-dot" + (connected ? " connected" : "");
        document.getElementById("statusText").textContent = connected
          ? "Подключено"
          : "Нет соединения...";
      });

      // Listen to items
      onValue(itemsRef, (snap) => {
        allItems = snap.val() || {};
        renderList();
      });

      window.addItem = function () {
        const myName = getName();
        if (!myName) {
          toast("Сначала введи имя!");
          return;
        }
        const name = document.getElementById("itemName").value.trim();
        const qty = document.getElementById("itemQty").value.trim();
        const cat = document.getElementById("itemCat").value;
        const note = document.getElementById("itemNote").value.trim();
        const priceRaw = parseFloat(document.getElementById("itemPrice").value);
        const price = isNaN(priceRaw) ? null : priceRaw;
        if (!name) {
          toast("Введи название!");
          return;
        }
        push(itemsRef, {
          name,
          qty,
          cat,
          note,
          price,
          author: myName,
          votes: 0,
          voters: {},
          ts: Date.now(),
        });
        document.getElementById("itemName").value = "";
        document.getElementById("itemQty").value = "";
        document.getElementById("itemPrice").value = "";
        document.getElementById("itemNote").value = "";
        toast("Предложение добавлено 👍");
      };

      window.vote = function (id, dir) {
        const myName = getName();
        if (!myName) {
          toast("Сначала введи имя!");
          return;
        }
        const item = allItems[id];
        if (!item) return;
        const voters = item.voters || {};
        const prev = voters[nameKey(myName)] || 0;
        let delta = 0;
        let newVote = dir;
        if (prev === dir) {
          newVote = 0;
          delta = -dir;
        } // toggle off
        else {
          delta = dir - prev;
        }
        const updates = {};
        updates[`items/${id}/votes`] = (item.votes || 0) + delta;
        updates[`items/${id}/voters/${nameKey(myName)}`] = newVote;
        update(ref(db), updates);
      };

      window.deleteItem = function (id) {
        const myName = getName();
        const item = allItems[id];
        if (!item) return;
        if (item.author !== myName) {
          toast("Можно удалять только свои предложения");
          return;
        }
        if (!confirm(`Удалить "${item.name}"?`)) return;
        remove(ref(db, `items/${id}`));
      };

      window.renderList = function () {
        const myName = getName();
        const list = document.getElementById("list");
        let items = Object.entries(allItems);
        if (currentTab !== "all")
          items = items.filter(([, v]) => v.cat === currentTab);
        items.sort(
          (a, b) => (b[1].votes || 0) - (a[1].votes || 0) || b[1].ts - a[1].ts,
        );

        // Update budget
        const allEntries = Object.values(allItems);
        const total = allEntries.reduce((s, v) => {
          const altsArr = Object.values(v.alternatives || {}).sort((a,b) => (b.votes||0)-(a.votes||0));
          const winnerPrice = altsArr.length > 0 && (altsArr[0].votes||0) > 0 && altsArr[0].price != null
            ? altsArr[0].price : null;
          return s + (winnerPrice ?? v.price ?? 0);
        }, 0);
        const bar = document.getElementById("budgetBar");
        if (total > 0) {
          bar.style.display = "flex";
          document.getElementById("totalSum").textContent = total.toLocaleString("ru-RU") + " ₽";
        } else {
          bar.style.display = "none";
        }

        if (!items.length) {
          list.innerHTML = `<div class="empty"><span class="emoji">🗒️</span>Предложений пока нет.<br>Добавь первое!</div>`;
          return;
        }

        const catLabel = {
          food: "🍖 Еда",
          drinks: "🥤 Напитки",
          gear: "⛺ Снаряжение",
          other: "📝 Прочее",
        };

        list.innerHTML = items
          .map(([id, item]) => {
            const myVote = (item.voters || {})[nameKey(myName)] || 0;
            const score = item.votes || 0;
            const scoreClass = score > 0 ? "pos" : score < 0 ? "neg" : "";

            // Alternatives
            const alts = Object.entries(item.alternatives || {})
              .sort((a,b) => (b[1].votes||0) - (a[1].votes||0));
            const winnerAltId = alts.length > 0 ? alts[0][0] : null;
            const winnerAlt = alts.length > 0 && (alts[0][1].votes||0) > 0 ? alts[0][1] : null;
            const altsHtml = alts.map(([aid, alt]) => {
              const myAltVote = (alt.voters || {})[nameKey(myName)] || 0;
              const altScore = alt.votes || 0;
              const isWinner = aid === winnerAltId && altScore > 0;
              return `<div class="alt-item ${isWinner ? 'winner' : ''}">
                <div class="alt-vote">
                  <button class="altVoteBtn up ${myAltVote===1?'active':''}" onclick="voteAlt('${id}','${aid}',1)">▲</button>
                  <span class="alt-score" style="color:${altScore>0?'var(--green)':altScore<0?'var(--red)':'var(--muted)'}">${altScore}</span>
                  <button class="altVoteBtn down ${myAltVote===-1?'active':''}" onclick="voteAlt('${id}','${aid}',-1)">▼</button>
                </div>
                <div style="flex:1">
                  ${alt.qty ? `<span class="alt-name">📦 ${esc(alt.qty)}</span>` : ''}
                  ${alt.price != null ? `<span class="alt-price"> · ${Number(alt.price).toLocaleString('ru-RU')} ₽</span>` : ''}
                  <span class="alt-author"> · от ${esc(alt.author)}</span>
                </div>
                ${isWinner ? '<span class="winner-badge">🏆 лидер</span>' : ''}
                ${alt.author === myName ? `<button onclick="deleteAlt('${id}','${aid}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;" title="Удалить">✕</button>` : ''}
              </div>`;
            }).join('');

            return `
        <div class="item ${myVote === 1 ? "voted-up" : myVote === -1 ? "voted-down" : ""}">
          <div class="vote-col">
            <button class="voteBtn up ${myVote === 1 ? "active" : ""}" onclick="vote('${id}',1)">▲</button>
            <span class="vote-score ${scoreClass}">${score}</span>
            <button class="voteBtn down ${myVote === -1 ? "active" : ""}" onclick="vote('${id}',-1)">▼</button>
          </div>
          <div class="item-body">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <span class="item-title">${esc(item.name)}</span>
              <button class="delete-btn" onclick="deleteItem('${id}')" title="Удалить">✕</button>
            </div>
            <div class="item-meta">
              ${winnerAlt?.qty ? `<span class="item-qty" style="background:rgba(62,207,142,.15);color:var(--green);">📦 ${esc(winnerAlt.qty)}</span>` : item.qty ? `<span class="item-qty">📦 ${esc(item.qty)}</span>` : ""}
              ${winnerAlt?.price != null ? `<span class="item-qty" style="background:rgba(62,207,142,.25);color:var(--green);">🏆 ${Number(winnerAlt.price).toLocaleString("ru-RU")} ₽</span>` : item.price != null ? `<span class="item-qty" style="background:rgba(62,207,142,.15);color:var(--green);">💰 ${Number(item.price).toLocaleString("ru-RU")} ₽</span>` : ""}
              <span class="item-cat">${catLabel[item.cat] || item.cat}</span>
              <span>от ${esc(item.author)}</span>
            </div>
            ${item.note ? `<div class="item-note">${esc(item.note)}</div>` : ""}
            <div class="alts-section">
              ${altsHtml}
              <div class="add-alt-row" id="altForm-${id}" style="display:none">
                <input type="text" id="altQty-${id}" placeholder="Кол-во (напр. 3 кг)" maxlength="40" />
                <input type="number" id="altPrice-${id}" placeholder="Цена ₽" min="0" style="max-width:90px" />
                <button onclick="addAlt('${id}')">＋ Добавить</button>
              </div>
              <span class="alts-toggle" onclick="toggleAltForm('${id}')">
                <span id="altToggleIcon-${id}">＋</span> предложить кол-во
              </span>
            </div>
          </div>
        </div>`;
          })
          .join("");
      };

      window.toggleAltForm = function(itemId) {
        const form = document.getElementById(`altForm-${itemId}`);
        const icon = document.getElementById(`altToggleIcon-${itemId}`);
        const visible = form.style.display !== 'none';
        form.style.display = visible ? 'none' : 'flex';
        icon.textContent = visible ? '＋' : '−';
        if (!visible) document.getElementById(`altQty-${itemId}`).focus();
      };

      window.addAlt = function(itemId) {
        const myName = getName();
        if (!myName) { toast('Сначала введи имя!'); return; }
        const qtyEl = document.getElementById(`altQty-${itemId}`);
        const priceEl = document.getElementById(`altPrice-${itemId}`);
        const qty = qtyEl.value.trim();
        const priceRaw = parseFloat(priceEl.value);
        const price = isNaN(priceRaw) ? null : priceRaw;
        if (!qty && price == null) { toast('Укажи кол-во или цену!'); return; }
        push(ref(db, `items/${itemId}/alternatives`), {
          qty, price, author: myName, votes: 0, voters: {}, ts: Date.now()
        });
        qtyEl.value = '';
        priceEl.value = '';
        document.getElementById(`altForm-${itemId}`).style.display = 'none';
        document.getElementById(`altToggleIcon-${itemId}`).textContent = '＋';
        toast('Вариант добавлен!');
      };

      window.voteAlt = function(itemId, altId, dir) {
        const myName = getName();
        if (!myName) { toast('Сначала введи имя!'); return; }
        const alt = (allItems[itemId]?.alternatives || {})[altId];
        if (!alt) return;
        const prev = (alt.voters || {})[nameKey(myName)] || 0;
        const newVote = prev === dir ? 0 : dir;
        const delta = newVote - prev;
        const updates = {};
        updates[`items/${itemId}/alternatives/${altId}/votes`] = (alt.votes || 0) + delta;
        updates[`items/${itemId}/alternatives/${altId}/voters/${nameKey(myName)}`] = newVote;
        update(ref(db), updates);
      };

      window.deleteAlt = function(itemId, altId) {
        remove(ref(db, `items/${itemId}/alternatives/${altId}`));
      };

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>

    <script>
      // Name management
      function setName() {
        const n = document.getElementById("nameInput").value.trim();
        if (!n) {
          document.getElementById("nameInput").focus();
          return;
        }
        myName = n;
        localStorage.setItem("lake_name", n);
        document.getElementById("headerName").textContent = n;
        document.getElementById("nameOverlay").style.display = "none";
        if (window.renderList) renderList();
      }

      document.getElementById("nameInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") setName();
      });

      // Auto-fill name
      const saved = localStorage.getItem("lake_name");
      if (saved) {
        document.getElementById("nameInput").value = saved;
        // slight delay to let Firebase init
        setTimeout(() => setName(), 300);
      }

      // Tab management
      function setTab(tab) {
        currentTab = tab;
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.toggle("active", t.dataset.tab === tab));
        if (window.renderList) renderList();
      }

      // Toast
      function toast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("show"), 2500);
      }

      // Enter to submit
      document.getElementById("itemName").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          document.getElementById("itemQty").focus();
        }
      });
    </script>
  </body>
</html>
